name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew lint

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Generate code coverage
        run: ./gradlew jacocoTestReport

      - name: Enforce APK size (<7MB)
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          SIZE_BYTES=$(stat -c%s "$APK_PATH")
          MAX_BYTES=$((7 * 1024 * 1024))
          echo "APK size: ${SIZE_BYTES} bytes"
          if [ "$SIZE_BYTES" -gt "$MAX_BYTES" ]; then
            echo "Release APK exceeds 7MB limit"
            exit 1
          fi

      - name: Publish build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tap-release-artifacts
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
            app/build/reports/lint-results-debug.html
            app/build/reports/jacoco/jacocoTestReport/html

      - name: Build summary
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          echo "## Tap CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- APK: $(du -h "$APK_PATH" | cut -f1)" >> "$GITHUB_STEP_SUMMARY"
          echo "- AAB: $(du -h "$AAB_PATH" | cut -f1)" >> "$GITHUB_STEP_SUMMARY"
