name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build signed release APK + AAB
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease bundleRelease

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "## Tap ${VERSION}" >> "$GITHUB_OUTPUT"
          echo "- Sensor-based single/double/triple back tap actions" >> "$GITHUB_OUTPUT"
          echo "- Accessibility service execution for GrapheneOS and API 24+ phones" >> "$GITHUB_OUTPUT"
          echo "- Release artifacts generated by GitHub Actions" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Optional webhook notification
        if: ${{ secrets.RELEASE_WEBHOOK_URL != '' }}
        env:
          RELEASE_WEBHOOK_URL: ${{ secrets.RELEASE_WEBHOOK_URL }}
        run: |
          curl -X POST "$RELEASE_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Tap release ${GITHUB_REF_NAME} is published.\"}"
